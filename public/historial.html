<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Viajes | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen flex overflow-hidden">

    <aside class="w-20 lg:w-64 bg-slate-900 border-r border-slate-700 flex flex-col transition-all duration-300">
        <div class="p-6 border-b border-slate-800 flex items-center justify-center lg:justify-start gap-3">
            <div class="bg-amber-500 w-8 h-8 rounded-full flex items-center justify-center text-slate-900 font-bold">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </div>
            <span class="hidden lg:block font-bold text-white tracking-wide">HISTORIAL</span>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="monitor.html" class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all group">
                <i class="fa-solid fa-map-location-dot text-xl group-hover:text-amber-500"></i>
                <span class="hidden lg:block font-medium">Monitor en Vivo</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-amber-500/10 border border-slate-700">
                <i class="fa-solid fa-list-check text-xl text-amber-500"></i>
                <span class="hidden lg:block font-medium">Historial de Viajes</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        
        <header class="bg-slate-900 border-b border-slate-800 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Bitácora de Viajes</h1>
                <p class="text-slate-500 text-sm" id="lblEmpresa">Cargando empresa...</p>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-950 p-2 rounded-lg border border-slate-700">
                <i class="fa-solid fa-calendar text-slate-400 ml-2"></i>
                <input type="text" id="fechaFiltro" class="bg-transparent text-white text-sm focus:outline-none w-32 text-center" placeholder="Seleccionar fecha">
                <button onclick="cargarHistorial()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-1.5 rounded text-sm font-bold transition">
                    BUSCAR
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div id="loading" class="hidden text-center mt-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-amber-500"></i>
                <p class="mt-4 text-slate-400">Buscando registros...</p>
            </div>

            <div id="lista-historial" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="col-span-full text-center mt-20 text-slate-500">
                    <i class="fa-solid fa-filter text-4xl mb-4 opacity-50"></i>
                    <p>Selecciona una fecha para ver los viajes finalizados.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let empresaActual = "";

        // Inicializar Calendario
        flatpickr("#fechaFiltro", {
            locale: "es",
            dateFormat: "Y-m-d",
            defaultDate: "today",
            theme: "dark"
        });

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            // Obtener empresa del usuario
            const doc = await db.collection('usuarios_web').doc(user.uid).get();
            if(doc.exists) {
                empresaActual = doc.data().empresa;
                document.getElementById('lblEmpresa').innerText = empresaActual;
                cargarHistorial(); // Cargar hoy por defecto
            }
        });

        async function cargarHistorial() {
            const fechaStr = document.getElementById('fechaFiltro').value;
            const lista = document.getElementById('lista-historial');
            const loader = document.getElementById('loading');

            if(!empresaActual) return;

            lista.innerHTML = "";
            loader.classList.remove('hidden');

            // Crear rango de fechas para la consulta (todo el día seleccionado)
            const fechaInicio = new Date(fechaStr + "T00:00:00");
            const fechaFin = new Date(fechaStr + "T23:59:59");

            try {
                // Consulta: Busca viajes de esta empresa, que hayan iniciado en ese rango de fecha
                // NOTA: Si Firestore pide un índice compuesto, abre la consola del navegador para ver el link de creación.
                const snapshot = await db.collection('jornadas')
                    .where('empresa', '==', empresaActual)
                    .where('timestamp_inicio', '>=', fechaInicio)
                    .where('timestamp_inicio', '<=', fechaFin)
                    .get();

                loader.classList.add('hidden');

                if (snapshot.empty) {
                    lista.innerHTML = `
                        <div class="col-span-full text-center mt-10 text-slate-500">
                            <p>No se encontraron viajes registrados en esta fecha.</p>
                        </div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 border border-slate-800 p-4 rounded-xl flex justify-between items-center hover:border-amber-500/50 transition shadow-lg";
                    
                    // Calcular duración si existe fecha fin
                    let duracion = "En curso";
                    if(data.timestamp_fin && data.timestamp_inicio) {
                        const diff = (data.timestamp_fin.toDate() - data.timestamp_inicio.toDate()) / (1000 * 60 * 60);
                        duracion = diff.toFixed(1) + " hrs";
                    }

                    const fechaHora = data.timestamp_inicio ? data.timestamp_inicio.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';

                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-slate-800 p-3 rounded-full text-amber-500">
                                <i class="fa-solid ${data.estatus === 'finalizado' ? 'fa-flag-checkered' : 'fa-truck-fast'}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white text-lg">${data.unidad || 'Unidad S/N'}</h3>
                                <p class="text-sm text-slate-400"><i class="fa-solid fa-user mr-1"></i> ${data.operador}</p>
                                <div class="flex items-center gap-2 mt-1 text-xs text-slate-500">
                                    <span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700">Inicio: ${fechaHora}</span>
                                    <span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700">Duración: ${duracion}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="text-right">
                            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Total Recorrido</p>
                            <span class="text-2xl font-mono font-bold text-white">${data.km_totales || 0}</span>
                            <span class="text-xs text-amber-500 font-bold">km</span>
                            <div class="mt-2">
                                <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${data.estatus === 'finalizado' ? 'bg-green-900/30 text-green-400 border border-green-900' : 'bg-blue-900/30 text-blue-400 border border-blue-900'}">
                                    ${data.estatus}
                                </span>
                            </div>
                        </div>
                    `;
                    lista.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                loader.classList.add('hidden');
                lista.innerHTML = `<div class="col-span-full text-center text-red-400">Error al cargar historial: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
