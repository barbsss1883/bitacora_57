<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bitácora 57 — Registro Empresarial</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root{
  --asphalt:#050c14;--dark:#080f1a;--panel:#0c1928;--border:#162234;
  --amber:#f59e0b;--amber-dim:#d97706;--amber-glow:#fbbf24;
  --white:#eef3f8;--muted:#5a7a94;
  --font-display:'Bebas Neue',sans-serif;--font-ui:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
}

body{
  background:var(--asphalt);color:var(--white);font-family:var(--font-body);
  min-height:100vh;margin:0;overflow-x:hidden;cursor:none;
}

#c{position:fixed;width:10px;height:10px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#canvas-container{position:fixed;inset:0;z-index:0;opacity:0.3;}

main{position:relative;z-index:1;display:flex;justify-content:center;padding:80px 20px;}

.form-box{
  background:var(--dark);border:1px solid var(--border);padding:40px;
  width:100%;max-width:500px;
  clip-path:polygon(0 0,calc(100% - 15px) 0,100% 15px,100% 100%,15px 100%,0 calc(100% - 15px));
}

h1{font-family:var(--font-display);font-size:42px;letter-spacing:2px;margin-bottom:30px;line-height:0.9;}
h1 span{color:var(--amber);}

.step{display:none;animation:fadeIn 0.4s ease forwards;}
.step.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.field{margin-bottom:20px;}
label{display:block;font-family:var(--font-ui);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

input, select, #card-element {
  width:100%;background:var(--panel);border:1px solid var(--border);padding:14px;
  color:var(--white);font-family:var(--font-ui);font-size:16px;outline:none;transition:all 0.3s;
}

/* Efecto de foco para el cuadro de Stripe */
#card-element.StripeElement--focus {
  border-color: var(--amber);
  box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
}

.btn{
  width:100%;padding:16px;background:var(--amber);color:var(--asphalt);
  font-family:var(--font-display);font-size:20px;letter-spacing:2px;border:none;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:0.3s;margin-top:10px;
}
.btn:hover:not(:disabled){background:var(--amber-glow);transform:translateY(-2px);}
.btn:disabled{opacity:0.5;cursor:wait;}

.error-msg{color:#ef4444;font-family:var(--font-ui);font-size:13px;margin-top:15px;display:none;background:rgba(239,68,68,0.1);padding:10px;border:1px solid rgba(239,68,68,0.2);}
</style>
</head>
<body>

<div id="c"></div>
<div id="canvas-container"></div>

<main>
  <div class="form-box">
    <h1>REGISTRO <span>EMPRESARIAL</span></h1>

    <div class="step active" id="s1">
      <div class="field">
        <label>Nombre de la Empresa</label>
        <input type="text" id="fe" placeholder="Ej. Transportes Especializados">
      </div>
      <div class="field">
        <label>Correo Electrónico</label>
        <input type="email" id="fem" placeholder="admin@empresa.com">
      </div>
      <div class="field">
        <label>Plan de Suscripción</label>
        <select id="fp">
          <option value="basico">PLAN BÁSICO - $499 MXN/mes</option>
          <option value="pro">PLAN PRO - $999 MXN/mes</option>
          <option value="empresa">PLAN EMPRESA - $1,799 MXN/mes</option>
        </select>
      </div>
      <button class="btn" onclick="nextStep(2)">SIGUIENTE: MÉTODO DE PAGO →</button>
    </div>

    <div class="step" id="s2">
      <div class="field">
        <label>Titular de la Tarjeta</label>
        <input type="text" id="cn" placeholder="Nombre completo">
      </div>
      <div class="field">
        <label>Datos de la Tarjeta Bancaria</label>
        <div id="card-element"></div>
      </div>
      <button class="btn" id="pbtn" onclick="doPago()">
        <span id="btxt">CONFIRMAR REGISTRO</span>
      </button>
      <div id="perr" class="error-msg"></div>
      <button style="background:none;border:none;color:var(--muted);font-size:11px;margin-top:20px;cursor:pointer;" onclick="nextStep(1)">← Editar información</button>
    </div>
  </div>
</main>

<script>
// --- CONFIG STRIPE ---
const STRIPE_KEY = 'tu_llave_publica'; 
const FN_URL = 'tu_url_edge_functions'; 

const strp = Stripe(STRIPE_KEY);
const elements = strp.elements();

// Personalización de los estilos internos de Stripe
const style = {
  base: {
    color: '#eef3f8',
    fontFamily: '"Barlow", sans-serif',
    fontSize: '16px',
    '::placeholder': { color: '#5a7a94' },
  },
  invalid: {
    color: '#ef4444',
    iconColor: '#ef4444'
  }
};

const cNum = elements.create('card', { style: style, hidePostalCode: true });
cNum.mount('#card-element');

function nextStep(n){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

async function doPago(){
  const btn = document.getElementById('pbtn');
  const btxt = document.getElementById('btxt');
  const perr = document.getElementById('perr');
  
  const em = document.getElementById('fem').value.trim();
  const empresa = document.getElementById('fe').value.trim();
  const nombre = document.getElementById('cn').value.trim();
  const planId = document.getElementById('fp').value;

  if(!nombre || !em || !empresa){
    perr.textContent = 'Completa todos los campos antes de continuar.';
    perr.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btxt.textContent = 'VALIDANDO...';
  perr.style.display = 'none';

  try {
    const resp = await fetch(`${FN_URL}/crear-suscripcion`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ plan: planId, email: em, empresa: empresa })
    });
    
    const data = await resp.json();
    if(data.error) throw new Error(data.error);

    const { error: stripeError, paymentIntent } = await strp.confirmCardPayment(data.clientSecret, {
      payment_method: { card: cNum, billing_details: { name: nombre, email: em } }
    });

    if(stripeError) throw new Error(stripeError.message);

    // Redirección profesional a confirmación
    const params = new URLSearchParams({ plan: planId, empresa: empresa, tx: paymentIntent.id });
    gsap.to('.form-box', { opacity: 0, y: -20, duration: 0.5, onComplete: () => {
        window.location.href = `confirmacion.html?${params.toString()}`;
    }});

  } catch (err) {
    perr.textContent = err.message;
    perr.style.display = 'block';
    btn.disabled = false;
    btxt.textContent = 'REINTENTAR PAGO';
  }
}

// Cursor y Fondo
const cursor = document.getElementById('c');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; });

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);
const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(15, 1), new THREE.MeshBasicMaterial({ color: 0xf59e0b, wireframe: true, transparent: true, opacity: 0.15 }));
scene.add(mesh);
camera.position.z = 40;
function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.003; renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
