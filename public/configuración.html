<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración | Bitácora 57</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body class="bg-slate-950 text-slate-200 font-sans">

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside id="sidebar"
class="fixed z-30 inset-y-0 left-0 w-64 bg-slate-900 border-r border-slate-800 transform -translate-x-full md:translate-x-0 md:static transition duration-300">

<div class="p-6 border-b border-slate-800">
<h1 class="text-lg font-bold text-white">BITÁCORA 57</h1>
<p class="text-xs text-slate-500 uppercase">Plataforma Empresarial</p>
</div>

<nav class="p-4 space-y-2 text-sm">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800">
<i class="fa-solid fa-chart-line mr-2"></i> Dashboard
</a>

<a href="monitor.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800">
<i class="fa-solid fa-map-location-dot mr-2"></i> Monitor
</a>

<a href="historial.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800">
<i class="fa-solid fa-clock-rotate-left mr-2"></i> Historial
</a>

<a href="configuracion.html" class="block px-4 py-3 rounded-lg bg-slate-800">
<i class="fa-solid fa-gear mr-2"></i> Configuración
</a>

</nav>

<div class="absolute bottom-0 w-full p-4 border-t border-slate-800">
<button onclick="logout()" class="w-full text-left text-red-400">
Cerrar sesión
</button>
</div>

</aside>

<div id="overlay"
class="fixed inset-0 bg-black/50 hidden md:hidden"
onclick="toggleSidebar()"></div>

<!-- CONTENIDO -->
<div class="flex-1 flex flex-col overflow-hidden">

<header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">
<button class="md:hidden" onclick="toggleSidebar()">
<i class="fa-solid fa-bars"></i>
</button>
<div id="lblEmpresa" class="text-sm text-slate-400">
Cargando empresa...
</div>
</header>

<main class="flex-1 overflow-y-auto p-6">

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

<!-- DATOS EMPRESA -->
<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">

<h2 class="text-lg font-bold mb-6">Datos Empresa</h2>

<form id="formInfo" class="space-y-4">

<input id="nombreEmpresa"
class="w-full bg-slate-950 border border-slate-800 rounded p-3 text-slate-400"
readonly>

<input id="rfc"
placeholder="RFC"
class="w-full bg-slate-950 border border-slate-700 rounded p-3">

<input id="telefono"
placeholder="Teléfono"
class="w-full bg-slate-950 border border-slate-700 rounded p-3">

<button
class="w-full bg-blue-600 py-3 rounded font-bold">
Guardar cambios
</button>

</form>

<div id="msgInfo"
class="text-sm mt-4 hidden"></div>

</div>

<!-- CAMBIAR CONTRASEÑA -->
<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">

<h2 class="text-lg font-bold mb-6">Seguridad</h2>

<form id="formPass" class="space-y-4">

<input id="newPass"
type="password"
placeholder="Nueva contraseña"
class="w-full bg-slate-950 border border-slate-700 rounded p-3">

<input id="confirmPass"
type="password"
placeholder="Confirmar contraseña"
class="w-full bg-slate-950 border border-slate-700 rounded p-3">

<button
class="w-full bg-amber-600 py-3 rounded font-bold">
Actualizar contraseña
</button>

</form>

<div id="msgPass"
class="text-sm mt-4 hidden"></div>

</div>

</div>

</main>
</div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
authDomain: "device-streaming-61499c4a.firebaseapp.com",
projectId: "device-streaming-61499c4a",
storageBucket: "device-streaming-61499c4a.firebasestorage.app",
messagingSenderId: "363075260432",
appId: "1:363075260432:web:d4028409282f0baedbba95"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(async user=>{
if(!user){
window.location.href="index.html";
return;
}

document.getElementById("lblEmpresa").innerText=user.email;

const doc=await db.collection("usuarios_web")
.doc(user.uid).get();

if(doc.exists){
const data=doc.data();
nombreEmpresa.value=data.empresa||"";
rfc.value=data.rfc||"";
telefono.value=data.telefono||"";
}
});

formInfo.addEventListener("submit",async e=>{
e.preventDefault();

const user=auth.currentUser;

await db.collection("usuarios_web")
.doc(user.uid)
.update({
rfc:rfc.value,
telefono:telefono.value
});

msgInfo.innerText="Información actualizada.";
msgInfo.classList.remove("hidden");
});

formPass.addEventListener("submit",async e=>{
e.preventDefault();

if(newPass.value!==confirmPass.value){
msgPass.innerText="Las contraseñas no coinciden.";
msgPass.classList.remove("hidden");
return;
}

await auth.currentUser.updatePassword(newPass.value);

msgPass.innerText="Contraseña actualizada.";
msgPass.classList.remove("hidden");
});

function toggleSidebar(){
sidebar.classList.toggle("-translate-x-full");
overlay.classList.toggle("hidden");
}

function logout(){
auth.signOut().then(()=>window.location.href="index.html");
}

</script>

</body>
</html>
