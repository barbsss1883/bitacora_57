<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #0f172a; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .glass-panel { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(4px); }
        #map { background: #0f172a; }
    </style>
</head>
<body class="flex h-screen text-slate-200 font-sans">

    <aside class="w-80 bg-slate-900 border-r border-slate-700 flex flex-col z-20 shadow-2xl">
        <div class="p-5 border-b border-slate-700 bg-slate-900">
            <h1 class="text-xl font-bold text-white tracking-wide">BITÁCORA <span class="text-amber-500">57</span></h1>
            <p class="text-xs text-slate-400 mt-1">Plataforma de Gestión de Flota</p>
        </div>

        <div class="p-4">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-3 text-slate-500 text-sm"></i>
                <input type="text" placeholder="Buscar unidad o chofer..." 
                    class="w-full bg-slate-800 text-sm text-white rounded-lg pl-9 pr-3 py-2.5 border border-slate-700 focus:outline-none focus:border-amber-500 transition-colors">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-2 pb-4" id="lista-unidades">
            <div class="text-center mt-10 text-slate-500 text-sm animate-pulse">
                Esperando conexión satelital...
            </div>
        </div>

        <div class="p-4 border-t border-slate-700 bg-slate-800 text-center">
            <button id="btn-reporte" onclick="generarReporte()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded transition text-sm shadow-lg">
                <i class="fa-solid fa-file-csv mr-2"></i> Reporte de Flota (CSV)
            </button>
        </div>
    </aside>

    <main class="flex-1 relative">
        <div class="absolute top-4 left-4 right-4 z-[400] flex justify-between pointer-events-none">
            <div class="glass-panel px-4 py-2 rounded-lg border border-slate-600 shadow-lg pointer-events-auto">
                <span class="text-xs font-bold text-slate-400 uppercase">Estado de Red</span>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="font-mono font-bold text-white" id="contador-activas">0 En Ruta</span>
                </div>
            </div>
            
            <div class="glass-panel px-4 py-2 rounded-lg border border-slate-600 shadow-lg pointer-events-auto cursor-pointer hover:bg-slate-700 transition">
                <i class="fa-solid fa-user-shield text-amber-500 mr-2"></i>
                <span class="text-sm font-bold">Admin: Luis</span>
            </div>
        </div>

        <div id="map" class="w-full h-full"></div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const map = L.map('map', { zoomControl: false }).setView([23.6345, -102.5528], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        const unidadesRenderizadas = new Map();

        // FUNCIÓN UNIFICADA PARA ESCUCHAR AMBAS COLECCIONES
        function configurarEscucha(nombreColeccion) {
            db.collection(nombreColeccion).onSnapshot((snapshot) => {
                const listaContainer = document.getElementById('lista-unidades');
                if(snapshot.size > 0 && listaContainer.innerText.includes("Esperando")) {
                    listaContainer.innerHTML = '';
                }

                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    const docId = change.doc.id;

                    if (change.type === "added" || change.type === "modified") {
                        let layer = null;
                        // SOPORTE PARA ruta O ruta_geojson
                        const rutaRaw = data.ruta_geojson || data.ruta;
                        if (rutaRaw) {
                            try {
                                const geoData = typeof rutaRaw === 'string' ? JSON.parse(rutaRaw) : rutaRaw;
                                const rutaGeo = { "type": "LineString", "coordinates": geoData };
                                layer = L.geoJSON(rutaGeo, {
                                    style: { color: (data.modalidad === 'Full' || data.unidad_tipo === 'Full') ? '#f59e0b' : '#3b82f6', weight: 4, opacity: 0.8 }
                                }).addTo(map);
                            } catch(e) { console.error("Error en ruta:", e); }
                        }
                        actualizarItemLista(docId, data, layer);
                    }
                });
                
                const total = document.querySelectorAll('[id^="card-"]').length;
                document.getElementById('contador-activas').innerText = `${total} Unidades`;
            });
        }

        // ESCUCHAMOS AMBAS PARA NO PERDER DATOS
        configurarEscucha("jornadas");
        configurarEscucha("rutas_maestras");

        function actualizarItemLista(id, data, layerRef) {
            const container = document.getElementById('lista-unidades');
            const existe = document.getElementById(`card-${id}`);
            if (existe) existe.remove();

            const empresa = data.permisionario || data.empresa || 'INDEPENDIENTE';
            const colorBadge = (empresa === 'PARTICULAR' || empresa === 'INDEPENDIENTE') ? 'bg-blue-900 text-blue-200' : 'bg-amber-900 text-amber-200';
            
            const btnPdf = data.pdf_url 
                ? `<a href="${data.pdf_url}" target="_blank" class="mt-3 flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-amber-500 text-[10px] font-bold py-2 rounded border border-amber-500/30 transition-all">
                    <i class="fa-solid fa-file-pdf"></i> VER BITÁCORA CERTIFICADA
                   </a>`
                : `<div class="mt-3 py-2 text-[9px] text-slate-500 italic text-center border border-slate-700 rounded bg-slate-900/50">
                    <i class="fa-solid fa-spinner fa-spin mr-1"></i> Viaje en curso...
                   </div>`;

            const cardHTML = `
                <div id="card-${id}" class="group bg-slate-800 p-3 rounded-lg mb-2 border border-slate-700 hover:border-amber-500 cursor-pointer transition-all shadow-sm" onclick="enfocarUnidad('${id}')">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-white text-sm">${data.operador || 'Conductor'}</h3>
                            <span class="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded ${colorBadge} border border-white/10">
                                ${empresa}
                            </span>
                        </div>
                        <i class="fa-solid fa-truck-moving text-slate-500 group-hover:text-amber-500"></i>
                    </div>
                    <div class="flex items-center justify-between text-xs text-slate-400">
                        <span class="unidad-info"><i class="fa-solid fa-road mr-1"></i> ${data.unidad || data.unidad_tipo || 'Unidad'}</span>
                        <span><i class="fa-regular fa-clock mr-1"></i> ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    ${btnPdf}
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', cardHTML);
            if(layerRef) unidadesRenderizadas.set(id, layerRef);
        }

        window.enfocarUnidad = (id) => {
            const layer = unidadesRenderizadas.get(id);
            if (layer) {
                map.fitBounds(layer.getBounds(), { padding: [50, 50], maxZoom: 14 });
                document.querySelectorAll('[id^="card-"]').forEach(el => el.classList.remove('border-amber-500', 'bg-slate-700'));
                const card = document.getElementById(`card-${id}`);
                if(card) card.classList.add('border-amber-500', 'bg-slate-700');
            }
        };

        function generarReporte() {
            let contenido = "Operador,Empresa,Unidad,Fecha\n";
            document.querySelectorAll('[id^="card-"]').forEach(card => {
                const nombre = card.querySelector('h3').innerText;
                const empresa = card.querySelector('span').innerText;
                const unidad = card.querySelector('.unidad-info').innerText.trim();
                contenido += `${nombre},${empresa},${unidad},${new Date().toLocaleDateString()}\n`;
            });
            const blob = new Blob([contenido], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Reporte_Bitacora57.csv`;
            a.click();
        }
    </script>
</body>
</html>
