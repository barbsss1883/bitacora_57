<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor B2B | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #0f172a; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .glass-panel { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(4px); }
        .parpadeo { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
        #map { background: #0f172a; z-index: 1; }
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border: 1px solid #475569; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="flex h-screen text-slate-200 font-sans">

    <aside class="w-80 bg-slate-900 border-r border-slate-700 flex flex-col z-20 shadow-2xl">
        <div class="p-5 border-b border-slate-700 bg-slate-950">
            <h1 class="text-xl font-bold text-white tracking-wide">MONITOR <span class="text-amber-500">B2B</span></h1>
            <p class="text-xs text-slate-400 mt-1 uppercase truncate" id="lblEmpresa">
                <i class="fa-solid fa-circle-notch fa-spin mr-1"></i> Cargando...
            </p>
        </div>

        <div class="p-4 space-y-2">
            <div class="relative mb-4">
                <i class="fa-solid fa-search absolute left-3 top-3 text-slate-500 text-sm"></i>
                <input type="text" id="buscador" placeholder="Buscar unidad..." 
                    class="w-full bg-slate-800 text-sm text-white rounded-lg pl-9 pr-3 py-2.5 border border-slate-700 focus:outline-none focus:border-amber-500 transition-colors">
            </div>

            <a href="historial.html" class="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-lg border border-slate-700 transition-colors text-sm font-bold shadow-lg">
                <i class="fa-solid fa-clock-rotate-left text-amber-500"></i>
                VER HISTORIAL DE VIAJES
            </a>
        </div>

        <div class="flex-1 overflow-y-auto px-2 pb-4 space-y-2" id="lista-unidades">
            <div class="text-center mt-10 text-slate-500 text-xs">
                Esperando señal satelital...
            </div>
        </div>

        <div class="p-4 border-t border-slate-700 bg-slate-800 text-center space-y-2">
            <a href="perfil.html" class="block text-slate-400 hover:text-white hover:bg-slate-700 text-sm py-2 rounded transition-colors border border-transparent hover:border-slate-600">
                <i class="fa-solid fa-gear mr-2"></i> Mi Cuenta
            </a>
            <button onclick="logout()" class="w-full text-red-400 hover:text-red-300 hover:bg-red-900/20 text-sm py-2 rounded transition-colors border border-transparent hover:border-red-900/50">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 relative">
        <div class="absolute top-4 left-4 z-[400]">
            <div class="glass-panel px-4 py-2 rounded-lg border border-slate-600 shadow-lg flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <div>
                    <span class="block text-[10px] font-bold text-slate-400 uppercase">Unidades Activas</span>
                    <span class="block font-mono font-bold text-white text-lg leading-none" id="contador-activas">0</span>
                </div>
            </div>
        </div>
            
        <div id="alertaSos" class="hidden absolute top-4 right-4 z-[400] glass-panel px-6 py-3 rounded-lg border border-red-600 bg-red-900/90 shadow-2xl pointer-events-auto parpadeo flex items-center gap-4 max-w-sm">
            <div class="bg-red-600/20 p-3 rounded-full">
                <i class="fa-solid fa-triangle-exclamation text-red-500 text-2xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-white text-sm">¡ALERTA DE PÁNICO!</h3>
                <p class="text-xs text-red-200 mt-1" id="txtSos">Unidad reportando emergencia</p>
                <button onclick="cerrarAlerta()" class="mt-2 text-[10px] bg-red-950/50 hover:bg-red-950 px-3 py-1 rounded border border-red-800 text-white">Entendido</button>
            </div>
        </div>

        <div id="map" class="w-full h-full"></div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const map = L.map('map', { zoomControl: false }).setView([23.6345, -102.5528], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
            attribution: '&copy; Bitácora 57',
            maxZoom: 19 
        }).addTo(map);

        const marcadores = {}; 
        const rutasLayers = {}; 
        let empresaActual = "";

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'index.html'; return; }
            try {
                const doc = await db.collection('usuarios_web').doc(user.uid).get();
                if (doc.exists) {
                    empresaActual = doc.data().empresa;
                    document.getElementById('lblEmpresa').innerHTML = `<i class="fa-solid fa-building text-amber-500 mr-2"></i> ${empresaActual}`;
                    iniciarMonitoreo(empresaActual);
                } else {
                    alert("Tu usuario no tiene una empresa asignada. Contacta a soporte.");
                    logout();
                }
            } catch (error) { console.error(error); }
        });

        function iniciarMonitoreo(empresa) {
            const listaContainer = document.getElementById('lista-unidades');
            db.collection("jornadas")
                .where("empresa", "==", empresa)
                .onSnapshot((snapshot) => {
                    if(snapshot.empty) {
                        listaContainer.innerHTML = `<div class="text-center mt-20 opacity-50"><i class="fa-solid fa-satellite-dish text-4xl mb-2"></i><p class="text-xs">Sin unidades activas</p></div>`;
                        return;
                    }
                    if(listaContainer.innerText.includes("Esperando")) listaContainer.innerHTML = '';

                    snapshot.docChanges().forEach((change) => {
                        const data = change.doc.data();
                        const id = change.doc.id;
                        if (change.type === "added" || change.type === "modified") procesarUnidad(id, data);
                        if (change.type === "removed") eliminarUnidad(id);
                    });
                    actualizarContador();
                });

            db.collection("alertas_inspeccion")
                .where("empresa", "==", empresa)
                .where("tipo", "==", "PANICO_EMERGENCIA")
                .orderBy("timestamp", "desc")
                .limit(1)
                .onSnapshot((snapshot) => {
                    if(!snapshot.empty) {
                        const alerta = snapshot.docs[0].data();
                        const tiempoAlerta = alerta.timestamp?.toDate() || new Date();
                        if ((new Date() - tiempoAlerta) / 60000 < 30) mostrarAlertaSOS(alerta);
                    }
                });
        }

        function procesarUnidad(id, data) {
            if (data.estatus === 'finalizado') { eliminarUnidad(id); return; }

            // 1. ACTUALIZAR LISTA LATERAL
            const lista = document.getElementById('lista-unidades');
            let item = document.getElementById(`card-${id}`);
            
            const htmlContent = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${data.velocidad > 0 ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}"></span>
                            <h3 class="font-bold text-white text-sm uppercase">${data.unidad || 'Sin Nombre'}</h3>
                        </div>
                        <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-user-astronaut mr-1"></i> ${data.operador}</p>
                    </div>
                    <div class="text-right">
                        <span class="block text-lg font-mono font-bold text-amber-500">${Math.round(data.velocidad || 0)} <span class="text-[10px]">km/h</span></span>
                    </div>
                </div>
                <div class="mt-2 pt-2 border-t border-slate-700/50 flex justify-between text-[10px] text-slate-500">
                    <span><i class="fa-solid fa-location-dot mr-1"></i> ${data.origen || '...'} > ${data.destino || '...'}</span>
                </div>
            `;

            if (!item) {
                item = document.createElement('div');
                item.id = `card-${id}`;
                item.className = "bg-slate-800/50 p-3 rounded-lg border border-slate-700 hover:border-amber-500 hover:bg-slate-800 cursor-pointer transition-all mb-2";
                item.onclick = () => enfocarMapa(id);
                lista.prepend(item);
            }
            item.innerHTML = htmlContent;

            // 2. ACTUALIZAR MAPA (¡CORREGIDO PARA MOSTRAR AUN SIN RUTA!)
            let posicionActual = null;

            // Opción A: Tiene historial de puntos (Dibujamos línea y marcador)
            if (data.puntos_rastreo && data.puntos_rastreo.length > 0) {
                const latlngs = data.puntos_rastreo.map(p => [p.lat, p.lng]);
                posicionActual = latlngs[latlngs.length - 1];

                if (rutasLayers[id]) map.removeLayer(rutasLayers[id]);
                rutasLayers[id] = L.polyline(latlngs, {color: '#f59e0b', weight: 4, opacity: 0.7}).addTo(map);
            } 
            // Opción B: No tiene historial pero tiene ubicación actual única (Dibujamos solo marcador)
            else if (data.ubicacion_actual) {
                posicionActual = [data.ubicacion_actual.lat, data.ubicacion_actual.lng];
            }

            // Si logramos obtener una posición, dibujamos el camión
            if (posicionActual) {
                const iconoCamion = L.divIcon({
                    className: 'custom-icon',
                    html: `<div class="bg-amber-500 w-4 h-4 rounded-full border-2 border-white shadow-lg shadow-amber-500/50"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                if (marcadores[id]) {
                    marcadores[id].setLatLng(posicionActual);
                    marcadores[id].setPopupContent(crearPopup(data));
                } else {
                    marcadores[id] = L.marker(posicionActual, {icon: iconoCamion}).addTo(map).bindPopup(crearPopup(data));
                }
            }
        }

        function crearPopup(data) {
            return `<div class="text-center"><strong class="text-amber-500">${data.unidad}</strong><br>${Math.round(data.velocidad || 0)} km/h<br><span class="text-xs text-slate-400">En ruta</span></div>`;
        }

        function eliminarUnidad(id) {
            const item = document.getElementById(`card-${id}`);
            if (item) item.remove();
            if (marcadores[id]) { map.removeLayer(marcadores[id]); delete marcadores[id]; }
            if (rutasLayers[id]) { map.removeLayer(rutasLayers[id]); delete rutasLayers[id]; }
            actualizarContador();
        }

        function actualizarContador() {
            document.getElementById('contador-activas').innerText = Object.keys(marcadores).length;
        }

        function enfocarMapa(id) {
            if (marcadores[id]) {
                map.setView(marcadores[id].getLatLng(), 15);
                marcadores[id].openPopup();
            }
        }

        function mostrarAlertaSOS(alerta) {
            const box = document.getElementById('alertaSos');
            const txt = document.getElementById('txtSos');
            box.classList.remove('hidden');
            txt.innerHTML = `<strong>${alerta.usuario}</strong><br>${alerta.detalles}`;
            if(alerta.ubicacion) {
                map.flyTo([alerta.ubicacion.lat, alerta.ubicacion.long], 16);
                L.marker([alerta.ubicacion.lat, alerta.ubicacion.long], {
                    icon: L.divIcon({html: '<i class="fa-solid fa-triangle-exclamation text-red-500 text-3xl"></i>', className: 'bg-transparent'})
                }).addTo(map).bindPopup(`<b class="text-red-500">¡EMERGENCIA!</b>`).openPopup();
            }
        }

        function cerrarAlerta() { document.getElementById('alertaSos').classList.add('hidden'); }
        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
