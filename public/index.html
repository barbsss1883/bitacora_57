<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora 57 | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center h-screen">

    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-800">
        
        <div class="text-center mb-8">
            <div class="bg-amber-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-500/20">
                <i class="fa-solid fa-route text-4xl text-slate-900"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">BITÁCORA 57</h1>
            <p class="text-slate-500 text-sm mt-1">Acceso a Monitor B2B</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label class="block text-slate-400 text-xs font-bold uppercase mb-2">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" class="w-full bg-slate-950 border border-slate-700 rounded-lg py-3 pl-10 pr-3 text-white focus:border-amber-500 focus:outline-none focus:ring-1 focus:ring-amber-500 transition-colors" placeholder="usuario@empresa.com" required>
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-xs font-bold uppercase mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="w-full bg-slate-950 border border-slate-700 rounded-lg py-3 pl-10 pr-3 text-white focus:border-amber-500 focus:outline-none focus:ring-1 focus:ring-amber-500 transition-colors" placeholder="••••••••" required>
                </div>
            </div>

            <div id="errorMsg" class="hidden text-red-400 text-xs text-center bg-red-900/20 p-2 rounded border border-red-900/50"></div>

            <button type="submit" id="btnLogin" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-lg transition-all shadow-lg shadow-amber-500/20 transform hover:scale-[1.02]">
                INGRESAR AL MONITOR
            </button>
        </form>
        
        <p class="text-center text-slate-600 text-xs mt-6">
            © 2026 Bitácora 57 - Control de Flotas
        </p>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- 2. LÓGICA DE REDIRECCIÓN ---
        // Aquí es donde ocurre la magia: Si entra, va al Monitor.
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("Usuario verificado. Redirigiendo al Monitor...");
                window.location.href = 'monitor.html'; 
            }
        });

        // --- 3. EVENTO DE LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('errorMsg');

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verificando...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                // Si las credenciales son buenas, el 'onAuthStateChanged' de arriba hará el redireccionamiento
                await auth.signInWithEmailAndPassword(email, password);
                
            } catch (error) {
                console.error(error);
                btn.innerHTML = 'INGRESAR AL MONITOR';
                btn.disabled = false;
                
                // Mensaje de error para el usuario
                let mensaje = "Error de acceso.";
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    mensaje = "Usuario o contraseña incorrectos.";
                } else if (error.code === 'auth/too-many-requests') {
                    mensaje = "Demasiados intentos. Espera un momento.";
                }

                errorDiv.innerText = mensaje;
                errorDiv.classList.remove('hidden');
                
                // Efecto de sacudida
                const card = document.querySelector('.bg-slate-900');
                card.classList.add('animate-pulse');
                setTimeout(() => card.classList.remove('animate-pulse'), 500);
            }
        });
    </script>
</body>
</html>
