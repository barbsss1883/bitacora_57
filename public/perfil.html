<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen p-6 flex justify-center items-start">

    <div class="w-full max-w-4xl space-y-6">
        
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <a href="monitor.html" class="bg-slate-800 hover:bg-slate-700 text-white p-3 rounded-full transition shadow-lg border border-slate-700">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold text-white">Configuración de Cuenta</h1>
                    <p class="text-slate-500 text-sm">Gestiona la información de tu empresa</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                    <div class="bg-blue-600/20 p-2 rounded-lg text-blue-500">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <h2 class="text-lg font-bold text-white">Datos Fiscales y Contacto</h2>
                </div>

                <form id="formInfo" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Comercial (No editable)</label>
                        <input type="text" id="nombreEmpresa" class="w-full bg-slate-950 text-slate-400 border border-slate-800 rounded p-3 cursor-not-allowed" readonly>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">RFC / ID Fiscal</label>
                        <input type="text" id="rfc" class="w-full bg-slate-950 text-white border border-slate-700 rounded p-3 focus:border-blue-500 focus:outline-none" placeholder="Ej: GCE901010..." required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Dirección Fiscal</label>
                        <input type="text" id="direccion" class="w-full bg-slate-950 text-white border border-slate-700 rounded p-3 focus:border-blue-500 focus:outline-none" placeholder="Calle, Número, Colonia, Ciudad">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Teléfono de Contacto</label>
                        <input type="tel" id="telefono" class="w-full bg-slate-950 text-white border border-slate-700 rounded p-3 focus:border-blue-500 focus:outline-none" placeholder="(000) 000-0000">
                    </div>

                    <div id="msgInfo" class="hidden p-3 rounded text-sm text-center"></div>

                    <button type="submit" id="btnInfo" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition mt-4">
                        GUARDAR CAMBIOS
                    </button>
                </form>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl h-fit">
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                    <div class="bg-amber-600/20 p-2 rounded-lg text-amber-500">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h2 class="text-lg font-bold text-white">Seguridad</h2>
                </div>

                <form id="formPass" class="space-y-4">
                    <div class="bg-slate-800/50 p-3 rounded border border-slate-700 mb-4">
                        <p class="text-xs text-slate-400">
                            <i class="fa-solid fa-circle-info mr-1"></i> 
                            Tu correo actual es: <span id="emailDisplay" class="text-white font-mono">...</span>
                        </p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nueva Contraseña</label>
                        <input type="password" id="newPass" class="w-full bg-slate-950 text-white border border-slate-700 rounded p-3 focus:border-amber-500 focus:outline-none" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Confirmar Contraseña</label>
                        <input type="password" id="confirmPass" class="w-full bg-slate-950 text-white border border-slate-700 rounded p-3 focus:border-amber-500 focus:outline-none" placeholder="Repite la contraseña" required>
                    </div>

                    <div id="msgPass" class="hidden p-3 rounded text-sm text-center"></div>

                    <button type="submit" id="btnPass" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-lg transition mt-4">
                        ACTUALIZAR CONTRASEÑA
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. CARGAR DATOS AL ENTRAR
        auth.onAuthStateChanged(async user => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Mostrar correo
            document.getElementById('emailDisplay').innerText = user.email;

            // Cargar datos de Firestore
            try {
                const doc = await db.collection('usuarios_web').doc(user.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('nombreEmpresa').value = data.empresa || '';
                    document.getElementById('rfc').value = data.rfc || '';
                    document.getElementById('direccion').value = data.direccion || '';
                    document.getElementById('telefono').value = data.telefono || '';
                }
            } catch (error) {
                console.error("Error cargando datos", error);
            }
        });

        // 2. GUARDAR DATOS DE EMPRESA
        document.getElementById('formInfo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnInfo');
            const msg = document.getElementById('msgInfo');
            const user = auth.currentUser;

            if(!user) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
            msg.className = "hidden";

            try {
                await db.collection('usuarios_web').doc(user.uid).update({
                    rfc: document.getElementById('rfc').value.trim(),
                    direccion: document.getElementById('direccion').value.trim(),
                    telefono: document.getElementById('telefono').value.trim()
                });

                msg.className = "bg-green-900/50 text-green-200 border border-green-500 p-3 rounded text-sm text-center block";
                msg.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Información actualizada correctamente.';
            } catch (error) {
                msg.className = "bg-red-900/50 text-red-200 border border-red-500 p-3 rounded text-sm text-center block";
                msg.innerText = "Error al guardar: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR CAMBIOS";
                setTimeout(() => msg.className = "hidden", 3000);
            }
        });

        // 3. CAMBIAR CONTRASEÑA
        document.getElementById('formPass').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            const btn = document.getElementById('btnPass');
            const msg = document.getElementById('msgPass');

            if (p1 !== p2) {
                msg.className = "bg-red-900/50 text-red-200 border border-red-500 p-3 rounded text-sm text-center block";
                msg.innerText = "Las contraseñas no coinciden.";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Actualizando...';
            msg.className = "hidden";

            const user = auth.currentUser;

            try {
                await user.updatePassword(p1);
                
                msg.className = "bg-green-900/50 text-green-200 border border-green-500 p-3 rounded text-sm text-center block";
                msg.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Contraseña cambiada. Usa la nueva en tu próximo inicio.';
                document.getElementById('formPass').reset();
            } catch (error) {
                console.error(error);
                let errorText = "Error al actualizar.";
                
                if (error.code === 'auth/requires-recent-login') {
                    errorText = "Por seguridad, debes cerrar sesión y volver a entrar antes de cambiar tu contraseña.";
                } else if (error.code === 'auth/weak-password') {
                    errorText = "La contraseña es muy débil. Usa al menos 6 caracteres.";
                }

                msg.className = "bg-red-900/50 text-red-200 border border-red-500 p-3 rounded text-sm text-center block";
                msg.innerText = errorText;
            } finally {
                btn.disabled = false;
                btn.innerText = "ACTUALIZAR CONTRASEÑA";
            }
        });
    </script>
</body>
</html>
