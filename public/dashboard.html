<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Bitácora 57</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body class="bg-slate-950 text-slate-200 font-sans">

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside id="sidebar"
class="fixed z-30 inset-y-0 left-0 w-64 bg-slate-900 border-r border-slate-800 transform -translate-x-full md:translate-x-0 md:static transition duration-300">

<div class="p-6 border-b border-slate-800">
<h1 class="text-lg font-bold text-white">BITÁCORA 57</h1>
<p class="text-xs text-slate-500 uppercase">Plataforma Empresarial</p>
</div>

<nav class="p-4 space-y-2 text-sm">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg bg-slate-800">
<i class="fa-solid fa-chart-line mr-2"></i> Dashboard
</a>

<a href="monitor.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">
<i class="fa-solid fa-map-location-dot mr-2"></i> Monitor
</a>

<a href="historial.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">
<i class="fa-solid fa-clock-rotate-left mr-2"></i> Historial
</a>

<a href="configuracion.html" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">
<i class="fa-solid fa-gear mr-2"></i> Configuración
</a>

</nav>

<div class="absolute bottom-0 w-full p-4 border-t border-slate-800">
<button onclick="logout()" class="w-full text-left text-red-400 hover:text-red-300">
<i class="fa-solid fa-right-from-bracket mr-2"></i> Cerrar sesión
</button>
</div>

</aside>

<div id="overlay" class="fixed inset-0 bg-black/50 hidden md:hidden"
onclick="toggleSidebar()"></div>

<!-- CONTENIDO -->
<div class="flex-1 flex flex-col overflow-hidden">

<header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">

<button class="md:hidden text-slate-400" onclick="toggleSidebar()">
<i class="fa-solid fa-bars"></i>
</button>

<div class="text-sm text-slate-400" id="lblEmpresa">
Cargando empresa...
</div>

</header>

<main class="flex-1 overflow-y-auto p-6">

<!-- TARJETAS -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
<p class="text-xs text-slate-400 uppercase">Viajes Activos</p>
<h2 class="text-3xl font-bold text-amber-500 mt-2" id="viajesActivos">0</h2>
</div>

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
<p class="text-xs text-slate-400 uppercase">Finalizados Hoy</p>
<h2 class="text-3xl font-bold text-green-500 mt-2" id="finalizadosHoy">0</h2>
</div>

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
<p class="text-xs text-slate-400 uppercase">Unidades Activas</p>
<h2 class="text-3xl font-bold text-white mt-2" id="unidadesActivas">0</h2>
</div>

<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
<p class="text-xs text-slate-400 uppercase">Km Totales Hoy</p>
<h2 class="text-3xl font-bold text-white mt-2" id="kmHoy">0</h2>
</div>

</div>

<!-- ÚLTIMOS VIAJES -->
<div class="bg-slate-900 rounded-2xl border border-slate-800">
<div class="p-6 border-b border-slate-800">
<h3 class="text-lg font-bold text-white">Últimos Viajes</h3>
</div>

<div class="overflow-x-auto">
<table class="w-full text-sm">
<thead class="bg-slate-950 text-slate-400 uppercase text-xs">
<tr>
<th class="p-4 text-left">Unidad</th>
<th class="p-4 text-left">Operador</th>
<th class="p-4 text-left">Inicio</th>
<th class="p-4 text-left">Estado</th>
<th class="p-4 text-right">Km</th>
</tr>
</thead>
<tbody id="tablaViajes" class="divide-y divide-slate-800">
<tr>
<td colspan="5" class="p-6 text-center text-slate-500">
Cargando datos...
</td>
</tr>
</tbody>
</table>
</div>
</div>

</main>
</div>
</div>

<script>

// FIREBASE CONFIG (USA EL TUYO EXACTO)
const firebaseConfig = {
apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
authDomain: "device-streaming-61499c4a.firebaseapp.com",
projectId: "device-streaming-61499c4a",
storageBucket: "device-streaming-61499c4a.firebasestorage.app",
messagingSenderId: "363075260432",
appId: "1:363075260432:web:d4028409282f0baedbba95"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let empresaActual = "";

auth.onAuthStateChanged(async user => {
if (!user) {
window.location.href = "index.html";
return;
}

const doc = await db.collection("usuarios_web").doc(user.uid).get();

if(doc.exists) {
empresaActual = doc.data().empresa;
document.getElementById("lblEmpresa").innerText = empresaActual;
cargarDashboard();
}
});

async function cargarDashboard() {

const hoyInicio = new Date();
hoyInicio.setHours(0,0,0,0);

const snapshot = await db.collection("jornadas")
.where("empresa","==",empresaActual)
.get();

let activos = 0;
let finalizadosHoy = 0;
let unidadesSet = new Set();
let kmHoy = 0;

let viajesOrdenados = [];

snapshot.forEach(doc => {
const data = doc.data();

if(data.estatus === "activo") activos++;

if(data.timestamp_inicio) {
const fechaInicio = data.timestamp_inicio.toDate();
if(fechaInicio >= hoyInicio) {
if(data.estatus === "finalizado") finalizadosHoy++;
kmHoy += data.km_totales || 0;
}
}

if(data.unidad) unidadesSet.add(data.unidad);

viajesOrdenados.push({
unidad: data.unidad,
operador: data.operador,
inicio: data.timestamp_inicio ? data.timestamp_inicio.toDate() : null,
estatus: data.estatus,
km: data.km_totales || 0
});
});

document.getElementById("viajesActivos").innerText = activos;
document.getElementById("finalizadosHoy").innerText = finalizadosHoy;
document.getElementById("unidadesActivas").innerText = unidadesSet.size;
document.getElementById("kmHoy").innerText = kmHoy;

viajesOrdenados.sort((a,b)=> b.inicio - a.inicio);

const tabla = document.getElementById("tablaViajes");
tabla.innerHTML = "";

viajesOrdenados.slice(0,5).forEach(v => {
tabla.innerHTML += `
<tr class="hover:bg-slate-800">
<td class="p-4">${v.unidad || '-'}</td>
<td class="p-4">${v.operador || '-'}</td>
<td class="p-4">${v.inicio ? v.inicio.toLocaleString() : '-'}</td>
<td class="p-4">
<span class="px-2 py-1 rounded text-xs ${
v.estatus === "finalizado"
? "bg-green-900/30 text-green-400"
: "bg-blue-900/30 text-blue-400"
}">${v.estatus}</span>
</td>
<td class="p-4 text-right font-mono">${v.km}</td>
</tr>`;
});

}

function toggleSidebar() {
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
sidebar.classList.toggle('-translate-x-full');
overlay.classList.toggle('hidden');
}

function logout() {
auth.signOut().then(()=>{
window.location.href = "index.html";
});
}


</script>

</body>
</html>
