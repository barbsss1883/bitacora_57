<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación SCT | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loader" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-amber-500 border-solid mx-auto"></div>
        <p class="mt-4 text-slate-400">Verificando Sello Digital...</p>
    </div>

    <div id="content" class="hidden w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <div class="bg-green-600 p-6 text-center rounded-t-2xl">
            <i class="fa-solid fa-circle-check text-5xl text-white mb-2"></i>
            <h1 class="text-xl font-bold text-white">VIAJE VERIFICADO</h1>
            <p class="text-green-100 text-xs text-uppercase">Documento Oficial NOM-087-SCT</p>
        </div>

        <div class="p-6 space-y-4">
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-sm">Operador</span>
                <span class="font-bold text-white" id="val-operador">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-sm">No. Licencia</span>
                <span class="font-bold text-amber-500" id="val-licencia">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-sm">Unidad</span>
                <span class="font-bold text-white" id="val-unidad">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-sm">Empresa</span>
                <span class="font-bold text-white" id="val-empresa">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-sm">Fecha Inicio</span>
                <span class="font-bold text-white text-sm" id="val-inicio">---</span>
            </div>
            
            <div class="mt-6 p-3 bg-slate-900 rounded-lg border border-slate-700">
                <p class="text-[10px] text-amber-500 font-bold mb-1 uppercase tracking-widest">Sello Digital SHA1</p>
                <p class="text-[9px] font-mono break-all text-slate-400" id="val-sello">---</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const idViaje = urlParams.get('id');

        async function validar() {
            if (!idViaje) { mostrarError(); return; }

            try {
                let doc = await db.collection("jornadas").doc(idViaje).get();
               if (!doc.exists) {
                    doc = await db.collection("rutas_maestras").doc(idViaje).get();
               }    
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('val-operador').innerText = data.operador;
                    document.getElementById('val-licencia').innerText = data.licencia || '---';
                    document.getElementById('val-unidad').innerText = data.unidad;
                    document.getElementById('val-empresa').innerText = data.permisionario;
                    document.getElementById('val-inicio').innerText = new Date(data.fecha_inicio).toLocaleString();
                    document.getElementById('val-sello').innerText = data.sello_digital || "VERIFICADO";
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
            } else {
                    document.getElementById('loader').innerHTML = '<p class="text-red-500">❌ Error: Registro no encontrado</p>';
                }
                
            } catch (e) { 
                console.error(e); 
                document.getElementById('loader').innerHTML = '<p class="text-red-500">❌ Error de conexión</p>';
            }
        }
        validar();
    </script>
</body>
</html>
