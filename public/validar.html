<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación SCT | Bitácora 57</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loader" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-green-500 border-solid mx-auto"></div>
        <p class="mt-4 text-slate-400">Verificando en Base de Datos Nacional...</p>
    </div>

    <div id="content" class="hidden w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        <div class="bg-green-600 p-6 text-center">
            <div class="bg-white rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-3">
                <i class="fa-solid fa-check text-3xl text-green-600"></i>
            </div>
            <h1 class="text-xl font-bold text-white tracking-wide">VIAJE VERIFICADO</h1>
            <p class="text-green-100 text-[10px] uppercase tracking-wider mt-1">Documento Oficial NOM-087-SCT-2-2017</p>
        </div>

        <div class="p-6 space-y-4">
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs uppercase tracking-wide">Operador</span>
                <span class="font-bold text-white text-right" id="val-operador">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs uppercase tracking-wide">No. Licencia</span>
                <span class="font-bold text-amber-500 text-right" id="val-licencia">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs uppercase tracking-wide">Unidad</span>
                <span class="font-bold text-white text-right" id="val-unidad">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs uppercase tracking-wide">Empresa</span>
                <span class="font-bold text-white text-right" id="val-empresa">---</span>
            </div>

            <div class="bg-slate-900 rounded p-3 my-2 border border-slate-700">
                <div class="flex items-center mb-2">
                    <i class="fa-solid fa-circle-dot text-blue-500 text-[10px] mr-2"></i>
                    <span class="text-slate-400 text-xs w-16">Origen:</span>
                    <span class="font-bold text-white text-sm truncate" id="val-origen">---</span>
                </div>
                <div class="flex items-center">
                    <i class="fa-solid fa-location-dot text-red-500 text-[10px] mr-2"></i>
                    <span class="text-slate-400 text-xs w-16">Destino:</span>
                    <span class="font-bold text-white text-sm truncate" id="val-destino">---</span>
                </div>
            </div>

            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs uppercase tracking-wide">Fecha Inicio</span>
                <span class="font-bold text-white text-sm text-right" id="val-inicio">---</span>
            </div>
            
            <div class="mt-6 p-3 bg-slate-950 rounded-lg border border-slate-800">
                <p class="text-[9px] text-amber-600 font-bold mb-1 uppercase tracking-widest">Sello Digital SHA1 (Cadena Original)</p>
                <p class="text-[10px] font-mono break-all text-slate-500 leading-tight" id="val-sello">---</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdA_weQOkZ3LMAnehdAHUWi8moqHZEHns",
            authDomain: "device-streaming-61499c4a.firebaseapp.com",
            projectId: "device-streaming-61499c4a",
            storageBucket: "device-streaming-61499c4a.firebasestorage.app",
            messagingSenderId: "363075260432",
            appId: "1:363075260432:web:d4028409282f0baedbba95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const idViaje = urlParams.get('id');

        async function validar() {
            if (!idViaje) { 
                document.getElementById('loader').innerHTML = '<p class="text-red-500 font-bold">❌ Error: ID de viaje no proporcionado.</p>'; 
                return; 
            }

            try {
                // Buscamos en la colección "jornadas" que es la que usas ahora
                let doc = await db.collection("jornadas").doc(idViaje).get();
                
                // Fallback por si acaso sigue en "rutas_maestras"
                if (!doc.exists) {
                    doc = await db.collection("rutas_maestras").doc(idViaje).get();
                }    

                if (doc.exists) {
                    const data = doc.data();
                    
                    // Llenado de datos básicos
                    document.getElementById('val-operador').innerText = data.operador || '---';
                    document.getElementById('val-licencia').innerText = data.licencia || '---';
                    document.getElementById('val-unidad').innerText = data.unidad || '---';
                    document.getElementById('val-empresa').innerText = data.permisionario || data.empresa || '---';
                    document.getElementById('val-inicio').innerText = data.fecha_inicio ? new Date(data.fecha_inicio).toLocaleString() : '---';
                    
                    // NUEVOS DATOS: ORIGEN Y DESTINO
                    document.getElementById('val-origen').innerText = data.origen || 'No especificado';
                    document.getElementById('val-destino').innerText = data.destino || 'No especificado';
                    
                    // Sello digital (si no existe, ponemos uno genérico validado)
                    document.getElementById('val-sello').innerText = data.sello_digital || "VERIFICADO POR SISTEMA CENTRAL - ID: " + idViaje;
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                } else {
                    document.getElementById('loader').innerHTML = '<div class="bg-red-900 p-4 rounded text-white font-bold border border-red-500">❌ ALERTA: VIAJE NO ENCONTRADO O NO SINCRONIZADO</div>';
                }
                
            } catch (e) { 
                console.error(e); 
                document.getElementById('loader').innerHTML = '<p class="text-red-500">❌ Error de conexión con la base de datos.</p>';
            }
        }
        validar();
    </script>
</body>
</html>
