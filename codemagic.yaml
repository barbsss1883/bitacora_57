workflows:
  android-production:
    name: Android Production Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://sbpyojhuihdpzxgrgmid.supabase.co
        EXPO_PUBLIC_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNicHlvamh1aWhkcHp4Z3JnbWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTM4MjEsImV4cCI6MjA5MjI4OTgyMX0.o_lux8lfEzkFAQMHJPa6WamZOzxvrBSHmU140FM48jQ
        MAPBOX_DOWNLOADS_TOKEN: $MAPBOX_DOWNLOADS_TOKEN
      android_signing:
        - bitacora57_keystore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar dependencias
        script: |
          npm install --ignore-scripts

      - name: Configurar EAS CLI
        script: |
          npm install -g eas-cli
          eas --version

      - name: Prebuild nativo
        script: |
          npx expo prebuild --platform android --clean

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease

      - name: Publicar OTA update (EAS Update)
        script: |
          eas update --branch production --message "Build $BUILD_NUMBER desde Codemagic" --non-interactive
        ignore_failure: true

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
