workflows:
  android-production:
    name: Android Production Build
    max_build_duration: 90
    environment:
      node: 20.18.0
      groups:
        - bitacora57
        - google_play_credentials
        - keystore_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar dependencias
        script: |
          npm install --ignore-scripts

      - name: Build con EAS
        script: |
          npm install -g eas-cli
          eas build --platform android --profile production --non-interactive --local --output $CM_BUILD_DIR/app-release.aab

      - name: Publicar OTA update
        script: |
          eas update --branch production --message "Build $BUILD_NUMBER desde Codemagic" --non-interactive
        ignore_failure: true

    artifacts:
      - $CM_BUILD_DIR/app-release.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
