workflows:
  android-production:
    name: Android Production Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      groups:
        - bitacora57
        - google_play_credentials
        - keystore_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Instalar dependencias
        script: |
          npm install --ignore-scripts

      - name: Configurar EAS CLI
        script: |
          npm install -g eas-cli
          eas --version

      - name: Configurar keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat >> ~/.gradle/gradle.properties << GRADLE
          MYAPP_UPLOAD_STORE_FILE=$CM_BUILD_DIR/keystore.jks
          MYAPP_UPLOAD_KEY_ALIAS=$CM_KEY_ALIAS
          MYAPP_UPLOAD_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          MYAPP_UPLOAD_KEY_PASSWORD=$CM_KEY_PASSWORD
          GRADLE

      - name: Prebuild nativo
        script: |
          npx expo prebuild --platform android --clean

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/keystore.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

      - name: Publicar OTA update (EAS Update)
        script: |
          eas update --branch production --message "Build $BUILD_NUMBER desde Codemagic" --non-interactive
        ignore_failure: true

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
