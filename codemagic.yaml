workflows:
  android-production:
    name: Android Production Build
    max_build_duration: 60
    environment:
      node: 20.18.0
      groups:
        - bitacora57
        - google_play_credentials
        - keystore_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Configurar Service Account
        script: |
          # Escribimos el contenido de la variable (JSON) directamente al archivo.
          # Las comillas dobles son fundamentales para preservar el formato.
          echo "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" > $CM_BUILD_DIR/service_account.json
          
          # Verificación rápida de seguridad (solo tamaño del archivo)
          ls -l $CM_BUILD_DIR/service_account.json

      - name: Instalar dependencias
        script: |
          npm install --ignore-scripts

      - name: Configurar EAS CLI
        script: |
          npm install -g eas-cli
          eas --version

      - name: Prebuild nativo
        script: |
          npx expo prebuild --platform android --clean

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease

      - name: Publicar OTA update (EAS Update)
        script: |
          # Asegúrate de tener la variable EXPO_TOKEN en tu grupo de variables
          eas update --branch production --message "Build $BUILD_NUMBER desde Codemagic" --non-interactive
        ignore_failure: true

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        # Aquí apuntamos al archivo que creamos en el primer script
        credentials: $CM_BUILD_DIR/service_account.json
        track: production
